name: POS-206 Backend Tests

on:
  pull_request:
    paths:
      - point_of_sale_backend/**
      - .github/workflows/pos206-backend-tests.yml
  push:
    branches: [main, master]
    paths:
      - point_of_sale_backend/**
      - .github/workflows/pos206-backend-tests.yml
  workflow_dispatch:

jobs:
  test-pos206:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd="mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    defaults:
      run:
        working-directory: point_of_sale_backend

    env:
      NODE_ENV: test
      MONGO_URI: mongodb://127.0.0.1:27017/pos206_test
      JWT_SECRET: ci_jwt_secret

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: point_of_sale_backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Run POS-206 integration tests
        run: npm run test:pos206
