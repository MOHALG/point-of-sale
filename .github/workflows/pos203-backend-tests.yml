name: POS-203 Backend Tests

on:
  pull_request:
    paths:
      - point_of_sale_backend/**
      - .github/workflows/pos203-backend-tests.yml
  workflow_dispatch:

jobs:
  test-pos203:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    defaults:
      run:
        working-directory: point_of_sale_backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: point_of_sale_backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Run POS-203 integration tests
        env:
          MONGO_URI: mongodb://localhost:27017/test_pos203
          JWT_SECRET: ci_jwt_secret
        run: npm run test:pos203
